<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>badge test</title>
    <style>
      body { font-family: monospace; padding: 2rem; background: #f0f0f0; }
      h2 { margin: 1.5rem 0 .5rem; font-size: .85rem; opacity: .5; }
      h3 { margin: 2rem 0 .5rem; font-size: 1rem; border-top: 1px dashed #ccc; padding-top: 1rem; }
      iframe { display: block; border: 1px dashed #ccc; }
    </style>
  </head>
  <body>
    <h3>eninabox</h3>
    <h2>default</h2>
    <iframe src="/u/eninabox/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>wide</h2>
    <iframe src="/u/eninabox/badge" width="600" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>narrow</h2>
    <iframe src="/u/eninabox/badge" width="240" height="110" frameborder="0" scrolling="no"></iframe>

    <h3>m3d</h3>
    <h2>default</h2>
    <iframe src="/u/m3d/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>wide</h2>
    <iframe src="/u/m3d/badge" width="600" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>narrow</h2>
    <iframe src="/u/m3d/badge" width="240" height="110" frameborder="0" scrolling="no"></iframe>

    <h3>yipee</h3>
    <h2>default</h2>
    <iframe src="/u/yipee/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>wide</h2>
    <iframe src="/u/yipee/badge" width="600" height="110" frameborder="0" scrolling="no"></iframe>
    <h2>narrow</h2>
    <iframe src="/u/yipee/badge" width="240" height="110" frameborder="0" scrolling="no"></iframe>

    <h3>on dark</h3>
    <div style="background:#1a1a1a;padding:1rem;display:inline-flex;flex-direction:column;gap:1rem">
      <iframe src="/u/eninabox/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
      <iframe src="/u/m3d/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
      <iframe src="/u/yipee/badge" width="380" height="110" frameborder="0" scrolling="no"></iframe>
    </div>
  </body>
</html>
