<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>mwa badge</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { background-color: #ece5d2; color: #271a08; font-family: monospace; }
      body.badge {
        font-size: .7rem;
        padding: .5rem;
        line-height: 1.4;
        overflow: hidden;
        border: none;
        max-width: none;
        text-align: left;
        display: flex;
        gap: .5rem;
      }
      #grid {
        display: flex;
        flex-wrap: wrap;
        width: 40%;
        min-width: 4rem;
        flex-shrink: 0;
        overflow: hidden;
        align-content: start;
        line-height: 1;
        font-size: .55rem;
      }
      .d { display: inline-block; width: 1.1em; text-align: center; opacity: .5; }
      #info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: .15rem;
      }
      #name { font-weight: bold; font-size: .7rem; font-style: normal; letter-spacing: normal; }
      #streak { font-weight: bold; font-size: .7rem; }
      #meta { opacity: .4; font-size: .6rem; font-family: monospace; }
      #meta a { color: inherit; text-decoration: none; }
      #meta a:hover { opacity: .7; }
      .badge p, .badge div { margin: 0; padding: 0; border: none; }
    </style>
  </head>
  <body class="badge">
    <div id="grid"></div>
    <div id="info">
      <div id="name"></div>
      <div id="streak"></div>
      <div id="meta"></div>
    </div>
    <script src="/src/util.js"></script>
    <script>
      const un = location.pathname.split("/").filter(Boolean)[1] || "";
      if (!un) { document.body.textContent = "no user specified."; throw null; }

      fetch("/api/user?u=" + encodeURIComponent(un))
        .then(r => r.ok ? r.json() : Promise.reject())
        .then(u => {
          if (u.css) {
            const s = document.createElement("style");
            s.textContent = u.css;
            document.head.appendChild(s);
          }
          document.getElementById("name").textContent = u.name + " makes " + u.thing;
          document.getElementById("streak").textContent = "x" + u.streak + " streak";
          document.getElementById("grid").innerHTML = renderDotGrid(u.hist || []);
          document.getElementById("meta").innerHTML =
            u.checkins + " logged · " +
            "<a href='https://makesweird.art/u/" + encodeURIComponent(u.name) + "' target='_blank'>makesweird.art</a>";
        })
        .catch(() => { document.body.textContent = "not found."; });
    </script>
  </body>
</html>
